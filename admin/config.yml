backend:
  name: git-gateway
  branch: main  # or "master" if that's your branch name

media_folder: "images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.html"
        fields:
          - { label: "Headline", name: "title", widget: "string" }
          - { label: "Body Text", name: "body", widget: "markdown" }
```


